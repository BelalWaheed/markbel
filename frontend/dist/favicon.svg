<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="cyber-logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>
    <filter id="cyber-neon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <mask id="keyhole-mask">
      <rect x="0" y="0" width="100" height="100" fill="white" />
      <circle cx="50" cy="40" r="5" fill="black" />
      <polygon points="48,40 52,40 54,49 46,49" fill="black" />
    </mask>
  </defs>
  <!-- Outer Hexagon Frame with Neon Glow -->
  <polygon 
    points="50,8 88,29 88,71 50,92 12,71 12,29" 
    fill="none" 
    stroke="url(#cyber-logo-grad)" 
    stroke-width="3.5" 
    stroke-linejoin="round"
    filter="url(#cyber-neon-glow)" 
  />
  <!-- Inner Bookmark Ribbon Shape with transparent cutout mask -->
  <path 
    d="M38,28 L62,28 L62,65 L50,55 L38,65 Z" 
    fill="url(#cyber-logo-grad)" 
    opacity="0.9" 
    mask="url(#keyhole-mask)"
  />
</svg>
